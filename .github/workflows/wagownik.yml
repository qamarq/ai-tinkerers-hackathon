name: Build Wagownik (TrackWeight)

on:
  push:
    branches:
      - main
      - wagownik
    paths:
      - "wagownik/**"
      - ".github/workflows/wagownik.yml"
  pull_request:
    branches:
      - main
    paths:
      - "wagownik/**"
      - ".github/workflows/wagownik.yml"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release with DMG"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  APP_NAME: TrackWeight
  SCHEME: TrackWeight
  CONFIGURATION: Release
  PROJECT_DIR: wagownik

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and archive (Universal Binary)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          xcodebuild \
            -project TrackWeight.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Install certificate
        if: env.BUILD_CERTIFICATE_BASE64 != ''
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Export app
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          HAS_CERT: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
        run: |
          if [[ "$HAS_CERT" == "true" ]]; then
            # Signed export
            xcodebuild \
              -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
              -exportPath "$RUNNER_TEMP/export" \
              -exportOptionsPlist ExportOptions.plist \
              -exportArchive
          else
            # Unsigned export — copy .app from archive directly
            echo "No signing certificate — exporting unsigned app"
            mkdir -p "$RUNNER_TEMP/export"
            cp -R "$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app" \
              "$RUNNER_TEMP/export/$APP_NAME.app"
          fi

      - name: Re-sign framework and app
        if: env.BUILD_CERTIFICATE_BASE64 != ''
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          SIGNING_IDENTITY: "Developer ID Application: Krish Shah (9ZRLG6277G)"
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          FRAMEWORK_PATH="$RUNNER_TEMP/export/$APP_NAME.app/Contents/Frameworks/OpenMultitouchSupportXCF.framework"

          if [[ -d "$FRAMEWORK_PATH" ]]; then
            echo "Re-signing framework..."
            codesign --force --sign "$SIGNING_IDENTITY" \
              --options runtime --timestamp \
              "$FRAMEWORK_PATH/Versions/A/OpenMultitouchSupportXCF"

            codesign --force --sign "$SIGNING_IDENTITY" \
              --options runtime --timestamp \
              "$FRAMEWORK_PATH"
          fi

          echo "Re-signing main application..."
          codesign --force --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "TrackWeight/TrackWeight.entitlements" \
            --timestamp --deep --strict \
            "$RUNNER_TEMP/export/$APP_NAME.app"

      - name: Verify binary
        run: |
          APP_BINARY="$RUNNER_TEMP/export/$APP_NAME.app/Contents/MacOS/$APP_NAME"
          echo "Architectures:"
          lipo -archs "$APP_BINARY"

          echo "Code signature:"
          codesign --verify --verbose "$RUNNER_TEMP/export/$APP_NAME.app" || echo "Unsigned build"

      - name: Notarize app
        if: env.APPLE_ID != '' && env.APPLE_ID_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd "$RUNNER_TEMP/export"

          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME.zip"

          xcrun notarytool submit "$APP_NAME.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 20m

          xcrun stapler staple "$APP_NAME.app"
          xcrun stapler validate "$APP_NAME.app"
          echo "Notarization complete"

      - name: Create DMG
        run: |
          brew install create-dmg

          DMG_STAGING="$RUNNER_TEMP/dmg_staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$RUNNER_TEMP/export/$APP_NAME.app" "$DMG_STAGING/"

          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 175 120 \
            --hide-extension "$APP_NAME.app" \
            --app-drop-link 425 120 \
            --hdiutil-quiet \
            "$RUNNER_TEMP/$APP_NAME.dmg" \
            "$DMG_STAGING/" || true

          # create-dmg exits 2 when it can't set custom icon (no icon file provided) but DMG is still valid
          if [[ -f "$RUNNER_TEMP/$APP_NAME.dmg" ]]; then
            echo "DMG created successfully"
          else
            echo "DMG creation failed"
            exit 1
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackWeight.dmg
          path: ${{ runner.temp }}/TrackWeight.dmg

      - name: Create GitHub Release
        if: inputs.create_release == true || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/TrackWeight.dmg
          generate_release_notes: true

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
